server:
  port: 8080

spring:
  application:
    name: citizen-issue-system

  # ── Database ──────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/citizen_issues
    username: postgres
    password: Monish@postgre
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns the schema
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ── Flyway ────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Email (use Mailtrap or Gmail for demo) ────────────
  mail:
    host: smtp.mailtrap.io       # swap with smtp.gmail.com for real
    port: 2525
    username: your_mailtrap_user  # replace with your credentials
    password: your_mailtrap_pass
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # ── Cache ─────────────────────────────────────────────
  cache:
    type: simple                  # In-memory cache (fine for hackathon)

# ── App custom config ─────────────────────────────────
app:
  jwt:
    secret: "hackathon-super-secret-key-change-in-production-min-32chars"
    expiration-ms: 86400000       # 24 hours

  notification:
    from-email: noreply@smartcity.gov
    admin-email: admin@smartcity.gov

  routing:
    auto-assign: true             # Auto-route issues to departments

# ── Actuator ──────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# ── Swagger UI ────────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
  api-docs:
    path: /api-docs

logging:
  level:
    com.smartcity: DEBUG
    org.hibernate.SQL: DEBUG
